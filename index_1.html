<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maturitní encyklopedie 2025</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,600&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* Základní nastavení písma pro celé tělo */
    html, body { 
      height: 100%; 
      overflow: hidden; 
      background: #080808; 
      color: rgba(255, 255, 255, 0.9); /* Jemnější bílá pro komfort očí */
      font-family: 'Inter', sans-serif; 
      -webkit-font-smoothing: antialiased;
    }

    #navbar {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: rgba(8,8,8,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(255,255,255,0.07); z-index: 1000;
      display: flex; align-items: center; padding: 0 24px; gap: 16px;
    }

    .search-wrapper { position: relative; }
    .nav-search {
      display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 7px 13px;
    }

    #search-input { 
      background: none; border: none; outline: none; color: white; 
      font-size: 13px; width: 220px; font-family: 'Inter', sans-serif; 
    }

    #search-results {
      position: absolute; top: 110%; left: 0; right: 0;
      background: #121212; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; overflow: hidden; display: none; z-index: 1100;
    }

    .result-item { 
      padding: 10px 15px; font-size: 13px; cursor: pointer; 
      border-bottom: 1px solid rgba(255,255,255,0.05); 
    }

    .nav-logo { 
      flex: 1; text-align: right; 
      font-family: 'Cormorant+Garamond', serif; 
      font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.4); 
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    #scroll-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
    #scroll-container::-webkit-scrollbar { display: none; }

    .book-slide { height: 100vh; scroll-snap-align: start; scroll-snap-stop: always; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    
    .slide-header { padding: 90px 40px 18px; position: relative; z-index: 2; }
    .slide-emoji { font-size: 36px; display: block; margin-bottom: 10px; }
    
    /* Nadpis knihy - Cormorant Garamond */
    .slide-title { 
      font-family: 'Cormorant Garamond', serif; 
      font-size: clamp(2.5rem, 6vw, 4.5rem); 
      font-weight: 700; line-height: 1.1; margin-bottom: 8px; 
      color: #fff;
    }

    /* Meta info a popisky - JetBrains Mono */
    .slide-meta { 
      font-size: 14px; color: rgba(255,255,255,0.5); 
      font-family: 'JetBrains Mono', monospace; line-height: 1.6; 
    }

    .tab-bar { display: flex; border-bottom: 0.5px solid rgba(255,255,255,0.08); padding: 0 38px; gap: 5px; overflow-x: auto; z-index: 2; }
    
    .tab { 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 10px; padding: 12px 10px; color: rgba(255,255,255,0.3); 
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em;
      border-bottom: 2px solid transparent; transition: 0.2s;
    }
    .tab.active { color: #fff; }

    .sections-area { flex: 1; overflow: hidden; position: relative; z-index: 2; }
    .section { display: none; height: 100%; overflow-y: auto; padding: 18px 40px 120px; animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .section.visible { display: flex; flex-direction: column; }
    
    /* Obdélníky pro text - Inter */
    .tip-box { 
      background: rgba(255,255,255,0.03); 
      border: 1px solid rgba(255,255,255,0.08); 
      border-radius: 12px; padding: 18px; margin-bottom: 14px; 
    }

    .tip-label { 
      font-size: 11px; font-family: 'JetBrains Mono', monospace; 
      letter-spacing: 0.1em; text-transform: uppercase; 
      margin-bottom: 8px; display: block; opacity: 0.5; 
    }

    .context-text { 
      font-size: 15px; line-height: 1.7; 
      font-weight: 300; color: rgba(255,255,255,0.85); 
    }

    #dots { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .dot { width: 4px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 50%; cursor: pointer; transition: 0.3s; }
    .dot.active { background: white; height: 20px; border-radius: 4px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

</head>

const TABS = [
  { id: 'autor', label: 'Autor' },
  { id: 'kontext', label: 'Kontext' },
  { id: 'postavy', label: 'Postavy' },
  { id: 'dej', label: 'Děj' },
  { id: 'myslenky', label: 'Myšlenky' },
  { id: 'forma', label: 'Forma' }
];

function buildSlides() {
  const container = document.getElementById('scroll-container');
  const dotsEl = document.getElementById('dots');
  container.innerHTML = '';
  dotsEl.innerHTML = '';

  knihy.forEach((k, idx) => {
    const styleId = 'style-' + k.id;
    if(!document.getElementById(styleId)) {
        const s = document.createElement('style');
        s.id = styleId;
        s.textContent = `[data-id="${k.id}"] .tab.active { color:${k.svetla}; border-bottom-color:${k.akcent}; } [data-id="${k.id}"] .tip-label { color:${k.svetla}; }`;
        document.head.appendChild(s);
    }

    const slide = document.createElement('div');
    slide.className = 'book-slide';
    slide.id = "slide-" + k.id;
    slide.dataset.id = k.id;
    slide.dataset.index = idx;

    slide.innerHTML = `
      <div style="position:absolute; inset:0; z-index:0; background:radial-gradient(circle at 10% 10%, ${k.akcent}20 0%, transparent 60%)"></div>
      <div class="slide-header">
        <span class="slide-emoji">${k.emoji}</span>
        <h1 class="slide-title">${k.nazev}</h1>
        <p class="slide-meta">${k.autor} · ${k.rok}<br><span style="color:white; font-weight:600;">${k.litDruh} / ${k.zaner}</span></p>
      </div>
      <div class="tab-bar">${TABS.map((t, i) => `<div class="tab${i===0?' active':''}" data-tab="${t.id}">${t.label}</div>`).join('')}</div>
      <div class="sections-area">
        <div class="section visible sec-autor">
          <div class="tip-box"><strong class="tip-label">Literární směr</strong><p class="context-text">${k.infoAutor.smer}</p></div>
          <div class="tip-box"><strong class="tip-label">Současníci</strong><p class="context-text">${k.infoAutor.soucasnici}</p></div>
          <div class="tip-box"><strong class="tip-label">Klíčová díla</strong><p class="context-text">${k.infoAutor.dila}</p></div>
          <div class="tip-box"><strong class="tip-label">Zajímavosti</strong><p class="context-text">${k.infoAutor.zajimavosti}</p></div>
        </div>
        
        <div class="section sec-kontext">
          ${k.kontext.odstavce.map(o => `<div class="tip-box"><strong class="tip-label">${o.label}</strong><p class="context-text">${o.text}</p></div>`).join('')}
          <div class="tip-box"><strong class="tip-label">💡 Maturitní tip</strong><p class="context-text">${k.kontext.tip}</p></div>
        </div>

        <div class="section sec-postavy">${k.postavy.map(p => `<div class="tip-box"><strong class="tip-label">${p.jmeno}</strong><p class="context-text">${p.popis}</p></div>`).join('')}</div>
        <div class="section sec-dej">${k.dej.map(d => `<div class="tip-box"><strong class="tip-label">${d.nadpis}</strong><p class="context-text">${d.text}</p></div>`).join('')}</div>
        <div class="section sec-myslenky">${k.myslenky.map(m => `<div class="tip-box"><strong class="tip-label">${m.nadpis}</strong><p class="context-text">${m.text}</p></div>`).join('')}</div>
        <div class="section sec-forma">
          ${k.forma.polozky.map(f => `<div class="tip-box"><strong class="tip-label">${f.label}</strong><p class="context-text">${f.hodnota}</p></div>`).join('')}
          <div class="tip-box"><strong class="tip-label">Způsob vyprávění</strong><p class="context-text">${k.forma.tip}</p></div>
        </div>
      </div>
    `;

    slide.querySelectorAll('.tab').forEach(tabEl => {
      tabEl.addEventListener('click', () => {
        slide.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tabEl.classList.add('active');
        slide.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
        slide.querySelector('.sec-' + tabEl.dataset.tab).classList.add('visible');
      });
    });

    container.appendChild(slide);
    const dot = document.createElement('div');
    dot.className = 'dot' + (idx===0?' active':'');
    dot.addEventListener('click', () => slide.scrollIntoView({ behavior: 'smooth' }));
    dotsEl.appendChild(dot);
  });
}

const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  searchResults.innerHTML = '';
  if (q.length > 0) {
    // Opraveno: hledá jen shody od začátku názvu
    const matches = knihy.filter(k => k.nazev.toLowerCase().startsWith(q));
    if (matches.length > 0) {
      matches.forEach(match => {
        const item = document.createElement('div');
        item.className = 'result-item';
        item.textContent = match.nazev;
        item.onclick = () => {
          document.getElementById('slide-' + match.id).scrollIntoView({ behavior: 'smooth' });
          searchResults.style.display = 'none';
          searchInput.value = '';
        };
        searchResults.appendChild(item);
      });
      searchResults.style.display = 'block';
    } else { searchResults.style.display = 'none'; }
  } else { searchResults.style.display = 'none'; }
});

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting) {
      const idx = e.target.dataset.index;
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i == idx));
    }
  });
}, { threshold: 0.5 });

buildSlides();
document.querySelectorAll('.book-slide').forEach(s => obs.observe(s));
</script>
